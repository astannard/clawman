title: Clawman
tagline: Context, in good claws.
description: >-
  A VS Code extension that finds every Claude context file in your project,
  flags the stale ones, and surfaces the contradictions.

# --- Deployment -------------------------------------------------------------
# If publishing to https://<user>.github.io/clawman, set baseurl to "/clawman".
# If publishing to a custom domain or a <user>.github.io root, leave it empty.
url: ""
baseurl: ""

github_username: your-github-username
repo: https://github.com/your-github-username/clawman
marketplace: https://marketplace.visualstudio.com/items?itemName=clawman.clawman

# --- Build ------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/
timezone: Etc/UTC

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: /feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .jekyll-cache
